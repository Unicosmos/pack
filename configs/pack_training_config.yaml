# YOLO训练配置文件
# 用于包装检测任务

# 基础任务配置
task: detect  # 任务类型：detect(目标检测)
# task: segment
mode: train   # 运行模式：train(训练)

# 项目管理配置
mlflow-uri: http://localhost:5001  # MLflow服务器地址
project: /root/source/data2/hyg/projects/pack/runs/detect  # 项目根目录
name: lscd_detection  # 实验名称
# name: pack_segmentation
exist_ok: false  # 是否允许覆盖已存在的实验目录

# 模型和数据配置
# 预训练模型路径 - 使用YOLOv8系列模型
model: yolov8-cheap.yaml  # 使用轻量级模型，适合快速训练

# 数据集配置文件路径
data: /root/source/data2/hyg/projects/pack/coco_style_oneclass/yolo_dataset/dataset.yaml  # 包装检测数据集

# 训练超参数
epochs: 50      # 训练轮数
batch: 16       # 批次大小，根据GPU内存调整
imgsz: 640      # 输入图像尺寸，640x640
device: 0       # 设备选择，使用第0号GPU
workers: 8      # 数据加载进程数
lr0: 0.001      # 初始学习率
patience: 10    # 早停耐心值
save_period: -1 # 模型保存周期，-1表示仅保存最佳模型
cache: true     # 数据缓存，加速训练
resume: false   # 是否恢复训练
fraction: 1.0   # 使用数据集的比例
seed: 42        # 随机种子，确保结果可复现

# 模型配置
pretrained: true      # 使用预训练权重
optimizer: auto       # 自动选择优化器
verbose: true         # 显示详细训练日志
deterministic: true   # 使用确定性算法
save: true           # 保存训练检查点

# 数据集配置
single_cls: false  # 多类别检测
rect: false        # 不使用矩形训练

# 学习率调度配置
cos_lr: true         # 使用余弦学习率调度
lrf: 0.01           # 最终学习率比例
momentum: 0.937     # SGD动量
weight_decay: 0.0005 # 权重衰减

# 学习率预热配置
warmup_epochs: 3.0    # 预热轮数
warmup_momentum: 0.8  # 预热阶段的动量值
warmup_bias_lr: 0.1   # 预热阶段bias层的学习率

# 训练控制配置
amp: true           # 混合精度训练
profile: false      # 性能分析
freeze: 0           # 不冻结层
multi_scale: false  # 不使用多尺度训练
close_mosaic: 10    # 最后10个epoch关闭mosaic增强

# 验证配置
val: true           # 在训练过程中进行验证
split: val          # 验证集划分
save_json: false    # 不保存COCO格式的验证结果JSON文件
plots: true         # 生成训练过程图表和验证结果可视化

# 推理配置
conf: 0.25          # 置信度阈值
iou: 0.45           # NMS的IoU阈值
max_det: 100        # 每张图像最大检测数量

# 损失函数权重
box: 7.5    # 边界框回归损失权重
cls: 1.0    # 分类损失权重
dfl: 1.5    # 分布焦点损失权重

# 数据增强配置
# HSV颜色空间增强
hsv_h: 0.015  # 色调变化范围
hsv_s: 0.7    # 饱和度变化范围
hsv_v: 0.4    # 亮度变化范围

# 几何变换增强
degrees: 0     # 旋转角度范围
translate: 0.1   # 平移范围
scale: 0.5       # 缩放范围
shear: 0.0       # 剪切变换角度
fliplr: 0.5      # 水平翻转概率
flipud: 0.0      # 垂直翻转概率

# 混合增强
mosaic: 0.6       # Mosaic增强概率
mixup: 0.1        # MixUp增强概率

# 预测和可视化配置
source: null         # 预测数据源路径
show: false          # 不实时显示检测结果
save_txt: false      # 不保存txt格式的检测结果
save_conf: false     # 不在保存结果中包含置信度
save_crop: false     # 不保存检测目标的裁剪图像
